services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: decimallens-backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      - backend-uploads:/app/uploads
    restart: always

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: decimallens-frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: always

volumes:
  backend-uploads:
